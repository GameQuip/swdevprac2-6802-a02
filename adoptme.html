<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Adopt Me</title>
</head>

<body>
    <div class="form header">
        <h1>Adoption Application</h1>
        <p>Tell us a bit about yourself!</p>
    </div>
    <form id="adoption-form">
        <div class="form-section">
            <h3>Contact Information</h3>
            <div class="input-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" name="full-name" placeholder="Firstname Lastname" required>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Living Condition</h3>
            <div class="input-group">
                <label for="address">Home Address</label>
                <textarea id="address" name="address" rows="3" placeholder="บ้านเลขที่, ถนน, แขวง/ตำบล, เขต/อำเภอ, จังหวัด, รหัสไปรษณีย์" required></textarea>
            </div>
            
            <div class="input-group">
                <label for="housing">Housing Type</label>
                <select id="housing" name="housing" required>
                    <option value="">Please choose</option>
                    <option value="garden">บ้านสวน</option>
                    <option value="detached">บ้านเดี่ยว</option>
                    <option value="townhome">บ้านทาวน์โฮม</option>
                    <option value="condo">คอนโดมิเนียม/หอพัก</option>
                </select>
            </div>

            <div class="input-group">
                <h3>Lifestyle</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="living-style" value="indoor" required>เลี้ยงสุนัขภายในบ้าน
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="living-style" value="outdoor">เลี้ยงสุนัขภายนอกบ้าน
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="pet-count">Pet Count</label>
                <input type="number" id="pet-count" name="pet-count" min="0" value="0" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreement" name="agreement" required>
                <label for="agreement">การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข</label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Send Information</button>
            <a href="index.html" class="back-link">Return to Main Page</a>
    </form>
    <br>
    <div class="bottom-mid">6833032521 Jesadakorn Netthong</div>
</body>

</html>
